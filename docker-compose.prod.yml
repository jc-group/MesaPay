services:
  db:
    image: postgres:16
    env_file:
      - .env.prod
    ports:
      - "5432:5432"
    volumes:
      - mesapay_db_prod_data:/var/lib/postgresql/data
      - ./MesaPayDB/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./MesaPayClient
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./MesaPayApp
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: npm run start

volumes:
  mesapay_db_prod_data:
