services:
  db:
    image: postgres:16
    env_file:
      - .env.dev
    ports:
      - "5432:5432"
    volumes:
      - mesapay_db_dev_data:/var/lib/postgresql/data
      - ./MesaPayDB/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./MesaPayClient
      dockerfile: Dockerfile.dev
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - ./MesaPayClient:/app

  frontend:
    build:
      context: ./MesaPayApp
      dockerfile: Dockerfile.dev
    env_file:
      - .env.dev
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./MesaPayApp:/app
      - mesapay_frontend_node_modules:/app/node_modules
    command: npm run dev

volumes:
  mesapay_db_dev_data:
  mesapay_frontend_node_modules:
